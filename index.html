<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elemancy — 원소 연금술 조합 디펜스</title>
  <style>
    :root {
      --bg: #06060f;
      --panel: rgba(20, 24, 52, 0.72);
      --line: rgba(120, 140, 255, 0.18);
      --accent: #7b8cff;
      --accent2: #d24bff;
      --text: #e9ecff;
      --muted: #8b93c4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(1200px 700px at 18% -10%, #1a1f4d 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #3a1150 0%, transparent 50%),
        var(--bg);
      display: flex; flex-direction: row; gap: 18px; align-items: flex-start;
      padding: 22px;
    }
    .stage { flex: 6 1 0; min-width: 0; }
    #game { width: 100%; height: auto; }   /* 컨테이너(70%) 폭에 맞춰 스케일 */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .stage, #panel { flex: none; width: 100%; }
    }
    .stage {
      position: relative; border-radius: 18px; padding: 8px;
      background: linear-gradient(135deg, rgba(123,140,255,0.25), rgba(210,75,255,0.18));
      box-shadow: 0 0 60px rgba(90,80,200,0.25);
    }
    #game {
      display: block; border-radius: 12px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
    }
    .title {
      position: absolute; top: 16px; left: 20px; margin: 0;
      font-size: 15px; letter-spacing: 3px; font-weight: 700;
      color: #fff; text-shadow: 0 0 14px var(--accent2); pointer-events: none;
      opacity: 0.9;
    }
    .title small { display:block; font-size:10px; letter-spacing:2px; color:var(--muted); text-shadow:none; }

    #panel {
      flex: 4 1 0; min-width: 0;
      padding: 16px; border-radius: 16px;
      background: var(--panel); backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
      display: grid; gap: 12px; align-content: start;
      grid-template-columns: repeat(2, minmax(0, 1fr));   /* 2열 */
    }
    /* 좁은 화면에서는 1열로 */
    @media (max-width: 760px) { #panel { grid-template-columns: 1fr; } }
    /* renderHud가 만드는 섹션 div들을 패널 그리드의 직접 자식으로 승격 */
    #hud { display: contents; }
    .sec {
      background: rgba(255,255,255,0.035); border: 1px solid var(--line);
      border-radius: 12px; padding: 14px;
    }
    .sec h4 { margin: 0 0 10px; font-size: 11px; letter-spacing: 1.5px; color: var(--muted); font-weight: 700; }
    .hud-row { display: flex; align-items: center; gap: 8px; font-size: 15px; margin: 8px 0; }
    .hud-row b { font-size: 17px; }
    .muted { color: var(--muted); font-size: 12px; }
    .wave-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 4px 12px; border-radius: 999px; font-weight: 700; font-size: 14px;
      box-shadow: 0 0 16px rgba(123,140,255,0.4); white-space: nowrap;
    }
    .wave-badge .slash { opacity: 0.7; font-weight: 400; }
    .phase { margin-left: auto; font-size: 13px; color: var(--muted); white-space: nowrap; }
    .gold b { color: #ffd23c; }

    .cap { margin: 14px 0; }
    .cap-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    .bar { height: 9px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width .2s, background .2s; box-shadow: 0 0 10px currentColor; }

    .bench-box { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
    .bench-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 12px; padding: 3px 9px; border-radius: 999px;
      background: color-mix(in srgb, var(--c) 22%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 60%, transparent);
      color: #fff; box-shadow: 0 0 8px color-mix(in srgb, var(--c) 35%, transparent);
    }
    .chip b { margin-left: 3px; opacity: 0.85; }

    hr { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }

    button {
      margin: 3px 0; padding: 10px 14px; width: 100%;
      background: linear-gradient(135deg, var(--accent), #5a63d8);
      color: #fff; border: 0; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; letter-spacing: .5px;
      transition: transform .08s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(90,99,216,0.35);
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(123,140,255,0.55); }
    button:active { transform: translateY(0); }
    #nextWave { background: linear-gradient(135deg, #ff7a3d, #ff3d7a); box-shadow: 0 4px 16px rgba(255,90,80,0.4); }

    .section-title { font-size: 12px; color: var(--muted); margin: 14px 0 6px; letter-spacing: 1px; }
    #combinePanel button {
      width: auto; display: inline-block; margin: 3px;
      background: rgba(123,140,255,0.16); border: 1px solid var(--line);
      box-shadow: none; font-weight: 500; padding: 7px 11px;
    }
    #combinePanel button:hover { background: rgba(123,140,255,0.3); }

    /* 골드 사용 컨트롤 */
    .btn-col { display: flex; flex-direction: column; gap: 6px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .mini {
      width: auto; margin: 0; padding: 8px 10px; font-size: 12px; font-weight: 500;
      background: rgba(123,140,255,0.14); border: 1px solid var(--line);
      box-shadow: none; display: flex; justify-content: space-between; gap: 8px; align-items: center;
    }
    .mini:hover:not(:disabled) { background: rgba(123,140,255,0.28); }
    .mini .cost { font-size: 11px; color: #ffd23c; }
    .btn-row .mini { flex: 1 1 auto; justify-content: center; }
    .log {
      margin-top: 6px; font-size: 12px; min-height: 16px; color: var(--muted);
      transition: color .2s;
    }
    .log.good { color: #8bf0a8; } .log.bad { color: #ff8a8a; }

    .banner { grid-column: 1 / -1; padding: 12px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 16px; }
    .banner.over { background: rgba(255,60,80,0.18); color: #ff8a8a; border: 1px solid rgba(255,60,80,0.4); }
    .banner.win { background: rgba(95,240,138,0.16); color: #8bf0a8; border: 1px solid rgba(95,240,138,0.4); }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="game" width="640" height="640"></canvas>
    <h1 class="title">ELEMANCY<small>원소 연금술 조합 디펜스</small></h1>
  </div>
  <div id="panel">
    <div class="sec" id="waveCard">
      <h4>🌊 현재 웨이브</h4>
      <div class="hud-row" id="waveInfo"></div>
      <button id="nextWave">다음 웨이브 시작 ▶</button>
      <div class="log" id="log"></div>
    </div>
    <div class="hud" id="hud"></div>
    <div class="sec" id="resourceCard">
      <h4>💰 자원</h4>
      <div id="resourceInfo"></div>
    </div>
    <div class="sec" id="selectedCard">
      <h4>🔧 선택 유닛 (이동 · 조합)</h4>
      <div id="selectedPanel"></div>
    </div>
    <div class="sec">
      <h4>🎁 랜덤 유닛 뽑기</h4>
      <div class="btn-col"><button id="drawBtn" class="mini"></button></div>
    </div>
    <div class="sec">
      <h4>⬆️ 공격력 업그레이드 (레벨당 +1%)</h4>
      <div id="upgradePanel" class="btn-col"></div>
    </div>
    <div class="sec">
      <h4>🎲 도박 (순손익 −베팅~+베팅)</h4>
      <div id="gamblePanel" class="btn-row"></div>
    </div>
    <div class="sec">
      <h4>🎰 원소 가챠</h4>
      <div id="gachaPanel" class="btn-col"></div>
    </div>
    <div class="sec" id="tokenCard">
      <h4>🎟️ 원소 선택권 (보스 처치 보상)</h4>
      <div id="tokenPanel"></div>
    </div>
  </div>
  <script src="src/config.js"></script>
  <script src="src/balance.js"></script>
  <script src="src/alchemy.js"></script>
  <script src="src/wavesystem.js"></script>
  <script src="src/stats.js"></script>
  <script src="src/combat.js"></script>
  <script src="src/game.js"></script>
  <script src="src/render.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
