<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elemancy — 원소 연금술 조합 디펜스</title>
  <style>
    :root {
      --bg: #06060f;
      --panel: rgba(20, 24, 52, 0.72);
      --line: rgba(120, 140, 255, 0.18);
      --accent: #7b8cff;
      --accent2: #d24bff;
      --text: #e9ecff;
      --muted: #8b93c4;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; color: var(--text); height: 100vh; overflow: hidden;
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(1200px 700px at 18% -10%, #1a1f4d 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #3a1150 0%, transparent 50%),
        var(--bg);
      display: flex; flex-direction: column; gap: 12px; padding: 14px;
    }
    /* 상단 바 */
    .topbar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 18px;
      padding: 10px 18px; border-radius: 14px;
      background: var(--panel); border: 1px solid var(--line); backdrop-filter: blur(10px);
    }
    .topbar .brand { font-size: 16px; font-weight: 800; letter-spacing: 3px; text-shadow: 0 0 14px var(--accent2); }
    .topbar .brand small { font-size: 10px; letter-spacing: 1px; color: var(--muted); margin-left: 8px; text-shadow: none; }
    .round-display {
      margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 15px;
    }
    .round-display .pill {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 6px 16px; border-radius: 999px; font-weight: 800;
      box-shadow: 0 0 16px rgba(123,140,255,0.4); white-space: nowrap;
    }
    .round-display .timer { font-variant-numeric: tabular-nums; }
    .round-display .timer b { font-size: 20px; color: #ffd23c; }
    .icon-btn {
      width: auto; margin: 0; padding: 9px 14px; font-size: 14px;
      background: rgba(123,140,255,0.16); border: 1px solid var(--line); box-shadow: none;
    }
    .icon-btn:hover { background: rgba(123,140,255,0.3); }

    /* 메인: 보드 + 패널 */
    .main { flex: 1 1 auto; min-height: 0; display: flex; gap: 14px; }
    .stage {
      flex: 6 1 0; min-width: 0;
      position: relative; border-radius: 18px; padding: 8px;
      background: linear-gradient(135deg, rgba(123,140,255,0.25), rgba(210,75,255,0.18));
      box-shadow: 0 0 60px rgba(90,80,200,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    #game {
      display: block; border-radius: 12px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
      /* 표시 크기는 JS(fitCanvas)가 뷰포트 높이에 맞춰 설정 */
    }
    .title {
      position: absolute; top: 14px; left: 18px; margin: 0;
      font-size: 13px; letter-spacing: 2px; font-weight: 700;
      color: #fff; text-shadow: 0 0 14px var(--accent2); pointer-events: none; opacity: 0.85;
    }
    .title small { display:block; font-size:9px; letter-spacing:1px; color:var(--muted); text-shadow:none; }

    #panel {
      flex: 4 1 0; min-width: 0; height: 100%; overflow-y: auto;
      padding: 14px; border-radius: 16px;
      background: var(--panel); backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
      display: grid; gap: 8px; align-content: start;
      grid-template-columns: repeat(2, minmax(0, 1fr));   /* 2열 */
    }

    /* 조합식 팝업 */
    .modal { position: fixed; inset: 0; background: rgba(4,4,12,0.72); display: flex;
      align-items: center; justify-content: center; z-index: 50; padding: 24px; }
    .modal.hidden { display: none; }
    .modal-card {
      background: #12152e; border: 1px solid var(--line); border-radius: 16px;
      width: min(820px, 100%); max-height: 86vh; overflow-y: auto; padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-card h2 { margin: 0 0 4px; font-size: 18px; }
    .modal-head { display: flex; align-items: center; margin-bottom: 14px; }
    .modal-head .close { margin-left: auto; width: auto; padding: 6px 12px; background: rgba(255,255,255,0.08); box-shadow: none; }
    .recipe-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .recipe-tabs .tab {
      width: auto; margin: 0; padding: 7px 12px; font-size: 12px; font-weight: 600;
      background: rgba(123,140,255,0.12); border: 1px solid var(--line); box-shadow: none;
    }
    .recipe-tabs .tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .recipe { background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 13px; }
    .recipe .res { font-weight: 700; }
    .recipe .ing { color: var(--muted); font-size: 12px; margin-top: 3px; }
    /* renderHud가 만드는 섹션 div들을 패널 그리드의 직접 자식으로 승격 */
    #hud { display: contents; }
    .sec {
      background: rgba(255,255,255,0.035); border: 1px solid var(--line);
      border-radius: 12px; padding: 10px 12px;
    }
    .sec h4 { margin: 0 0 6px; font-size: 11px; letter-spacing: 1.5px; color: var(--muted); font-weight: 700; }
    .hud-row { display: flex; align-items: center; gap: 8px; font-size: 15px; margin: 4px 0; }
    .hud-row b { font-size: 17px; }
    .muted { color: var(--muted); font-size: 12px; }
    .wave-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 4px 12px; border-radius: 999px; font-weight: 700; font-size: 14px;
      box-shadow: 0 0 16px rgba(123,140,255,0.4); white-space: nowrap;
    }
    .wave-badge .slash { opacity: 0.7; font-weight: 400; }
    .phase { margin-left: auto; font-size: 13px; color: var(--muted); white-space: nowrap; }
    .gold b { color: #ffd23c; }

    .cap { margin: 14px 0; }
    .cap-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    .bar { height: 9px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width .2s, background .2s; box-shadow: 0 0 10px currentColor; }

    .bench-box { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
    .bench-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 12px; padding: 3px 9px; border-radius: 999px;
      background: color-mix(in srgb, var(--c) 22%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 60%, transparent);
      color: #fff; box-shadow: 0 0 8px color-mix(in srgb, var(--c) 35%, transparent);
    }
    .chip b { margin-left: 3px; opacity: 0.85; }

    hr { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }

    button {
      margin: 2px 0; padding: 8px 14px; width: 100%;
      background: linear-gradient(135deg, var(--accent), #5a63d8);
      color: #fff; border: 0; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; letter-spacing: .5px;
      transition: transform .08s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(90,99,216,0.35);
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(123,140,255,0.55); }
    button:active { transform: translateY(0); }
    #nextWave { background: linear-gradient(135deg, #ff7a3d, #ff3d7a); box-shadow: 0 4px 16px rgba(255,90,80,0.4); }

    .section-title { font-size: 12px; color: var(--muted); margin: 14px 0 6px; letter-spacing: 1px; }
    #combinePanel button {
      width: auto; display: inline-block; margin: 3px;
      background: rgba(123,140,255,0.16); border: 1px solid var(--line);
      box-shadow: none; font-weight: 500; padding: 7px 11px;
    }
    #combinePanel button:hover { background: rgba(123,140,255,0.3); }

    /* 골드 사용 컨트롤 */
    .btn-col { display: flex; flex-direction: column; gap: 6px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .mini {
      width: auto; margin: 0; padding: 8px 10px; font-size: 12px; font-weight: 500;
      background: rgba(123,140,255,0.14); border: 1px solid var(--line);
      box-shadow: none; display: flex; justify-content: space-between; gap: 8px; align-items: center;
    }
    .mini:hover:not(:disabled) { background: rgba(123,140,255,0.28); }
    .mini:disabled { opacity: 0.45; cursor: default; }
    .mini .cost { font-size: 11px; color: #ffd23c; }
    .btn-row .mini { flex: 1 1 auto; justify-content: center; }
    /* 조합 옵션: 결과명 + 작은 조합식 */
    .combo { flex-direction: column; align-items: flex-start; gap: 2px; }
    .combo .combo-name { font-weight: 600; display: flex; justify-content: space-between; width: 100%; gap: 8px; }
    .combo .combo-recipe { font-size: 11px; color: var(--muted); }
    .log {
      margin-top: 6px; font-size: 12px; min-height: 16px; color: var(--muted);
      transition: color .2s;
    }
    .log.good { color: #8bf0a8; } .log.bad { color: #ff8a8a; }

    .banner { grid-column: 1 / -1; padding: 12px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 16px; }
    .banner.over { background: rgba(255,60,80,0.18); color: #ff8a8a; border: 1px solid rgba(255,60,80,0.4); }
    .banner.win { background: rgba(95,240,138,0.16); color: #8bf0a8; border: 1px solid rgba(95,240,138,0.4); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">ELEMANCY<small>원소 연금술 조합 디펜스</small></div>
    <div class="round-display">
      <span class="pill"><b id="topRound">0</b> 라운드</span>
      <span class="timer">⏱ <b id="topTimer">30</b>초</span>
    </div>
    <button id="recipeBtn" class="icon-btn">📜 조합식</button>
  </header>
  <div class="main">
  <div class="stage">
    <canvas id="game" width="640" height="640"></canvas>
    <h1 class="title">ELEMANCY<small>원소 연금술 조합 디펜스</small></h1>
  </div>
  <div id="panel">
    <div class="sec" id="waveCard">
      <h4>🌊 현재 웨이브</h4>
      <div class="hud-row" id="waveInfo"></div>
      <button id="nextWave">다음 웨이브 시작 ▶</button>
      <div class="log" id="log"></div>
    </div>
    <div class="hud" id="hud"></div>
    <div class="sec" id="resourceCard">
      <h4>💰 자원</h4>
      <div id="resourceInfo"></div>
    </div>
    <div class="sec" id="selectedCard">
      <h4>🔧 선택 유닛 (이동 · 조합)</h4>
      <div id="selectedPanel"></div>
    </div>
    <div class="sec">
      <h4>🎁 랜덤 유닛 뽑기</h4>
      <div class="btn-col"><button id="drawBtn" class="mini"></button></div>
    </div>
    <div class="sec">
      <h4>⬆️ 공격력 업그레이드 (레벨당 +1%)</h4>
      <div id="upgradePanel" class="btn-col"></div>
    </div>
    <div class="sec">
      <h4>🎲 도박 (순손익 −베팅~+베팅)</h4>
      <div id="gamblePanel" class="btn-row"></div>
    </div>
    <div class="sec">
      <h4>🎰 원소 가챠</h4>
      <div id="gachaPanel" class="btn-col"></div>
    </div>
    <div class="sec" id="questCard">
      <h4>🧭 퀘스트 (8라운드마다 · 선택권 획득)</h4>
      <div id="questPanel"></div>
    </div>
    <div class="sec" id="tokenCard">
      <h4>🎟️ 원소 선택권 (보스·퀘스트로 획득)</h4>
      <div id="tokenPanel"></div>
    </div>
  </div>
  </div>

  <div id="recipeModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2>📜 조합식 — 원소 연금술 트리</h2>
        <button class="close" id="recipeClose">✕ 닫기</button>
      </div>
      <div id="recipeTabs" class="recipe-tabs"></div>
      <div id="recipeBody"></div>
    </div>
  </div>

  <script src="src/config.js"></script>
  <script src="src/balance.js"></script>
  <script src="src/alchemy.js"></script>
  <script src="src/wavesystem.js"></script>
  <script src="src/stats.js"></script>
  <script src="src/combat.js"></script>
  <script src="src/game.js"></script>
  <script src="src/render.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
